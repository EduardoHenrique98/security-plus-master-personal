name: Monitor Security+ certification

on:
  schedule:
    - cron: '17 7 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify-official-version:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
      - name: Check the official CompTIA page
        run: node certification-monitor.mjs --write certification-status.json
      - name: Publish a refreshed client manifest
        run: |
          if git diff --quiet -- certification-status.json; then
            echo "Manifest already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add certification-status.json
          git commit -m "chore: refresh Security+ certification status"
          git push
