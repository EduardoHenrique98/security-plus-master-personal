name: Monitor Security+ certification

on:
  schedule:
    - cron: '17 7 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify-official-version:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
      - name: Check the official CompTIA page
        run: node certification-monitor.mjs --write certification-status.json
      - name: Publish a refreshed client manifest
        run: |
          if git diff --quiet -- certification-status.json; then
            echo "Manifest already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add certification-status.json
          git commit -m "chore: refresh Security+ certification status"
          git push
